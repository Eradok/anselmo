<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Iframe Test Bench</title>
    <style>
        body {
            background: #222;
            color: #eee;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controls {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: auto 200px auto;
            gap: 10px;
            align-items: center;
        }
        #stage {
            position: relative;
            width: 800px;
            height: 600px;
            background: #111;
            border: 2px dashed #444;
            overflow: hidden;
        }
        #monitor-frame {
            position: absolute;
            width: 420px;
            height: 700px;
            background: #000;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            left: 50%;
            top: 50%;
            /* Offset half width/height to center origin */
            margin-left: -210px;
            margin-top: -350px;
            transform-origin: center center;
            will-change: transform;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
            background: white;
        }
    </style>
</head>
<body>

    <div class="controls">
        <label>URL:</label>
        <input type="text" id="urlInput" value="https://anselmo.blog" style="grid-column: span 2;">
        
        <label>Rotate Y (Horizontal):</label>
        <input type="range" id="ry" min="-90" max="90" value="0">
        <span id="ry-val">0°</span>

        <label>Rotate X (Vertical):</label>
        <input type="range" id="rx" min="-90" max="90" value="0">
        <span id="rx-val">0°</span>

        <label>Scale:</label>
        <input type="range" id="scale" min="0.1" max="2" step="0.05" value="1">
        <span id="scale-val">1x</span>
    </div>

    <div id="stage">
        <div id="monitor-frame">
            <iframe id="test-iframe" src="https://anselmo.blog"></iframe>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('test-iframe');
        const urlInput = document.getElementById('urlInput');
        const frame = document.getElementById('monitor-frame');
        
        const ry = document.getElementById('ry');
        const rx = document.getElementById('rx');
        const scale = document.getElementById('scale');

        urlInput.addEventListener('change', () => { iframe.src = urlInput.value; });

        function updateTransform() {
            document.getElementById('ry-val').textContent = ry.value + '°';
            document.getElementById('rx-val').textContent = rx.value + '°';
            document.getElementById('scale-val').textContent = scale.value + 'x';

            frame.style.transform = `perspective(1200px) rotateY(${ry.value}deg) rotateX(${rx.value}deg) scale(${scale.value})`;
        }

        [ry, rx, scale].forEach(input => input.addEventListener('input', updateTransform));
        updateTransform();
    </script>
</body>
</html>
